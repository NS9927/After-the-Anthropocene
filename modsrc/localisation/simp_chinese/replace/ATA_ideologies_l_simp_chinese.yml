l_simp_chinese: 

 ### Academicism ###

 academicism_intro: "学院派原指东南亚地区社会大学库特学院 (Cootie Academy) 的一系列思潮, 现为一切激进的革命派的统称。其三条原则为: 须激进改变现状; 不放弃暴力革命; 须有进步的指导理论。"

 neo_universalism: "学院派"
 neo_universalism_desc: "新普世主义"
 neo_universalism_type_desc: "$academicism_intro$"
 neo_universalism_intro: "世界上是否可能存在一种理念，它既是革命者，亦是反动的拥护者？这个问题在“新普世主义”上得到了解答。\n\n作为学院派运动中最受争议的异类，新普世主义的存在就如一个混血儿。学院派并不充分接纳它，传统的普世主义帝国也视其为学院派的威胁。但作为新普世主义的提出者，狼蛛001显然并不关心这些排斥。尽管过往而言，“普世主义”即为大国沙文主义、保守主义、种族主义、霸权主义和一切反动事物的揉杂，但狼蛛001为其注入了全新的意义，进而创造出新普世主义的道路。普世主义构建的帝国是虚伪的，它名义上服从于一位皇帝，实际上却只服从于一个小小的利益集团。民主派乃至革命者，尽管他们宣称代表大众，但在运动中少数虫时常取得了最大的权力。历史向来如此：少数虫支配多数虫。而新普世主义给出了更为颠覆性的方案：当支配的关系转变为一位皇帝支配整个虫类时，平等和彻底的革新目标方能有实现的契机。结合全世界范围内的科学进步，新普世主义者希望创造拥有伟大智慧与无上意志的、作为“皇帝”而存在的超级虫类，而皇帝将向世界投射其意志，直至整个世界团结为一个伟大而唯一的虫类帝国，并屈从于皇帝一虫的意志。在这样的图景下，官僚、不公、社会动荡都将随之荡然无存。宛若神明的皇帝及其意志的延伸，以及接受皇帝统治的整个虫类文明，将成为旧世界唯一存留的事物。\n\n新普世主义因其颠覆性的构思而吸引了一部分社会群体，却也因为其革命蓝图的构想而遭受了更多虫类的排斥。狼蛛001及其党羽活跃于澳大拉西亚的蛛形纲抵抗军。而随着新普世主义在诸夏的发展，它也诞生了名为“新法家”的特殊分支。但不论如何演变，待到其真正的崛起之日，皇帝的意志将取代虫类本身的意志而决定世界的未来。\n"
 neo_universalism_intro_short: "学院派思潮之一，由狼蛛001主张。主要盛行于澳大利亚，在诸夏也有新法家的支持者。普世主义基础上更激进的绝对主义路线，主张一个被改造的超级政治领袖进行绝对独裁，舍弃官僚系统，建立单一的全球性帝国。"

 anarchism: "学院派"
 anarchism_desc: "无政府主义"
 anarchism_type_desc: "$academicism_intro$"
 anarchism_intro: "自层次分明的阶级与国家兴起以来，它们为公众与虫民带来的事物便充斥着苦难与许诺落空的失望。这种观念在两次世界大战中同样得到了强化：少数的所谓“社会精英”以所有虫的名义将所有虫推向死亡，而野心家与当权者却高枕无忧地在后方观看战线的推进。无数声怒吼自工厂、贫民窟与社会最低贱却又最根基的地方迸发，忍无可忍的公众将汇聚为黑色的滔天巨浪，以绝对的力量将虚伪的寄生虫扯得粉碎——不论它是贵族王侯，亦或是富甲一方的资产阶级，又或是体面地端坐于议员席位，宣称自己有资格代表群众的衣冠禽兽。\n\n正是在这黑色的浪潮之中，一面统一的旗帜——“无政府主义”也随之诞生。不公与阶级是它赖以生存的温室，公众的愤怒是它成长所汲取的蜂王浆。而当学院派的崛起开始广泛影响整个世界之后，尚未被定义的无政府主义也理所当然地被学院派所吸引，最终被整理和总结为学院派运动的一股强力的支流。随着学院派知识分子的加入，纯粹的平民派和小生产者也愈发被排除在运动之外。在第二次世界大战之后的世界舞台上，无政府主义也愈发作为一股真正具备力量和威胁性的革命势力而存在。无政府主义者对于经济和政治的议题各不相同，但可以确定的是，传统模式的私有财产与政治特权将在无政府主义的社会中永无翻身之日，甚至不再有资格存在。\n\n但正如其追求自由、反对阶级的主张带来的吸引力一样，无政府主义者同样因它而遭受分裂与对立。自南洋国际无政府主义大会开始，无政府主义便实际上分裂为以意大利蜜蜂为首的“纲领派”与以食蚜蝇为首的“大众派”两个分支。在随后的时间里，以欧亚国的安蜂虻为代表的“社会无政府主义者”，以及诸夏的“新道家”亦愈发撕扯着无政府主义者们，将其运动不断分割为诸多支流。\n\n尽管如此，面对迷茫的当下，无政府主义这头黑色的巨兽仍在从不停歇地战斗，就如奴隶对奴隶主的战争、贫民窟对宫殿的战争永不停歇一般。而在愈发混沌的当下，或许一条能够真正通往那自由、互爱而安乐的彼方之路正在以前所未有的趋势浮现。但在它真正抵达尽头之前，无政府主义者仍然将发出他们共同的呐喊：权力即毒药，自由的虫民万岁！\n"
 anarchism_intro_short: "学院派思潮之一，以人类世的无政府主义为基础，由激进的自由主义者主张。反对传统模式的私有制和政治特权，把纯粹的平民派和小生产者排除在运动外。主要有大众无政府主义、纲领无政府主义、社会无政府主义三大思潮，另有在诸夏的新道家无政府主义。"

 artism: "学院派"
 artism_desc: "美学主义"
 artism_type_desc: "$academicism_intro$"
 artism_intro: "旧秩序——精神瘫痪、软弱无力的老朽僵尸，除去足以压倒一切的力量以外一无是处。他们狭窄的眼光无法洞悉美丽，而只能以庸俗的利弊做出决断。一个文明被如此可悲的生物所掌控，将无法完成她的任何理想和目标。虫类的创造本能与对于美的认知，终会引领他们走向揭竿而起，将这无趣和僵化的文明点燃。而若想将文明自这样的泥潭中解救出来，敏感而充满激情的艺术家将是引领群众先锋的不二之选。\n\n学院派理念中的“美学主义”也因此而生，作为自学院派诞生之初便形成规模的革新理念，美学主义自始至终都坚持着他们的野望：缔造全新的社会与政治秩序，为如机器一般冰冷的社会注入激情的烈火，美学的大师——艺术家将成为社会毋庸置疑的掌控者，社会亦将化为其宏大的乐章，化作以世界为舞台、面向虫类文明的盛大演出。美学主义者对于热烈情感的宣扬在第二次世界大战中面临了严重的挑战：许多美学主义的拥护者乃至构建者在战场殒命，或是因战场的创伤而对美学主义激发激情的说辞而感到恐惧——毕竟，再没有比仇恨、怒火和凶残更激烈的情感了。即便如此，遭受冲击的美学主义依然在战后发掘了他们的支持者：大量被征召的、甚至在战时出生投入战场的战士。他们付出一切，却一无所有。他们愈发难以克制的怒火和斗志再次让低迷的美学主义振作起来，艺术、枪弹和美将再次引领民众走向抗争。\n\n时至今日，美学主义于学院派时代的创建者中，足以影响运动走向的绝对权威已然为沫蝉所有。世界范围内的美学主义也开始吸引艺术家的社团加入其中——从期望依靠革命民族主义争取解放的殖民地虫类，到诚挚热爱祖国的爱国者，又或是其他学院派思想的信奉者。合作经济与超工会学说的加入也使得美学主义走向扑朔迷离的演化：艺术亦有流派，那么何种流派将决定运动的未来？但至少在当下，这个问题并非考虑的首要目标。\n\n期望把握民众的心灵，需要有足够能力把握住那样生活的虫：勇敢、无畏、享受冒险而如古世代传说中狄奥尼索斯般生活的虫，需要拥有感染公众、征服成千上万个灵魂的能力。在如太阳般耀眼的领袖的指引下，不论新世界与新生活将以何种样貌呈现，它都必将美艳无比。\n"
 artism_intro_short: "学院派思潮之一，由豆娘、沫蝉、螽斯主张。主要盛行于地中海联邦。主张以艺术解救庸俗的旧社会，追求“生活艺术化，艺术政治化”的“艺术家治国”，将一系列艺术流派与美学概念政治运动化，以达成艺术掌控社会的新秩序。美学主义热烈的情感宣扬在第二次世界大战时受到冲击，但很快重新振作，吸引了艺术社团、民族解放者、爱国者、合作经济与超工会学说的加入，也与纲领无政府主义等其他学院派有合作。"

 shadowism: "学院派"
 shadowism_desc: "阴影主义"
 shadowism_type_desc: "$academicism_intro$"
 shadowism_intro: "一场声势浩大的革命究竟要付出多少牺牲，波及多少社会成员？面对这样的问题，大多数革命者时常习惯性地答复：只有当社会广泛地参与一场变革，革命方才具备实现的可能。而面对这种答复，“阴影主义”却给出了截然不同的反驳。\n\n作为来自库特学院的双斑猎蝽所提出的理念，阴影主义的信奉者时常是特立独行的。与寄希望于声势浩大的革命战争的学院派革命者不同，阴影主义往往拒绝以庞大的革命甚至内战实现其目标。取而代之的是，阴影主义者以无数秘密结社、兄弟会作为组织，以短暂而迅速的刺杀、袭击、政变作为其革命的手段。而在整个过程中，革命将会悄无声息，甚至在公众并未察觉的情况下完成。阴影主义的理想便是如手术刀般短暂而迅速地医治社会的顽疾，以秘密行动作为革命的形式，而不以带来无数死亡的战争。对于阴影主义者而言，社会革命经历短痛胜于长痛。阴影中的学院派革命者时常令当局不安，这也让他们时常以谨慎的手段发展力量：阴影主义时常笼罩在迷雾之中，或许任何一虫——社会活动家、工虫、政府官员、军队将领甚至其他学院派理论家，都可能有朝一日摇身一变成为阴影主义的追随者。这也使阴影主义尤其看重技术进步和隐晦地插手政治：也许心灵控制等技术手段可以更快捷地实现他们的目标，而阴影主义者同样不介意花费几年乃至几十年逐渐构建一套庞大的革命影子政府。\n\n时至今日，阴影主义在动荡的世界中已经开始采取行动。尽管目前为止其活跃的痕迹只是在欧罗巴地区大量出现的暗杀，以及令虫不安的阴谋活动信息；但愈来愈多的当局开始意识到一个显而易见的事实：比起兵戎相见，他们更需要警惕那些在身旁阴影中突然出击的革命者。\n"
 shadowism_intro_short: "学院派思潮之一，由双斑猎蝽提出，支持者有吉卜林巴希拉、蚁蟹蛛。主张依靠小团体的阴谋行动短暂而快速地实现社会革命，通过秘密结社进行刺杀、袭击、架空或军事政变，拒绝庞大的革命或内战。猎蝽带领大量社团在浩源幕府、欧洲与南美洲秘密活动，依靠刺杀或占领政治中心进行快速革命，在全社会范围内谨慎地发展力量。设想在长期时间内构建庞大的革命影子政府，亦可能在全世界范围建立国际阵营操纵受控制的国家进行社会改造。"

 revolutionary_bushido: "学院派"
 revolutionary_bushido_desc: "革命武士道"
 revolutionary_bushido_type_desc: "$academicism_intro$"
 revolutionary_bushido_intro: "对于大多数激进的社会运动家而言，传统社会的诸多阶层——武士、萨满、贵族或是皇帝不过是一丘之貉，他们以特权和无尽的贪婪阻拦着社会的进步，赫然是革命者最为主要的敌虫。但在一些较为特殊的状况下，阻力亦可以化为动力，绊脚石同样足以打磨为锋利的匕首。\n\n而正是在这样的理念之下，作为浩源幕府武士世家出身的枯叶螳放才会提出如此大胆的理念构建。枯叶螳把来自浩源幕府的支配者——武士阶层的道德观，与更为激进的社会革命主张相融合，创造出一套全新的理论思想体系。“革命武士道”也因此而诞生。作为一种全新的思想，革命武士道很快便在浩源幕府的社会中传播开来，甚至成为足以影响浩源幕府未来的政治力量。\n\n革命武士道构建的思想体系试图将浩源幕府本就存在的武士道理念做出崭新的阐释，将武士道所倡导的“荣誉”“克己”与“礼”同社会的激进革命思想相结合，从而构筑出这样一副革命蓝图：武士将作为幕府社会毋庸置疑的先锋队，引导并引领幕府的工虫阶级走向阶级斗争与解放。这套方案尽管看似不切实际，但在幕府武士经历的、足以改写思想与力量的改造手术下，反而具备了可能性。在经济与文化层面，革命武士道的信众达成了高度的一致：试图通过幕府主导的国有化与指令经济压制社会的豪强，而又高度宣扬尝试解放斗争。在对外的方案上，革命武士道的追随者亦赞同点燃亚洲解放的烈火，以及反对殖民主义、普世主义，引领亚洲范围的社会解放。但在这些激进主张被提出的同时，革命武士道的导师枯叶螳却也反对在真正意义上输出幕府的体制和理念：革命武士道是幕府社会文化所孕育的独立现象，而亚细亚诸部诸族真正的解放，绝无法通过幕府的施舍而获取。\n\n革命武士道能否成为驱散幕府与亚洲阴霾的希望？这是来自幕府民众的疑问和困惑。而这质疑却从不会动摇那些革命武士道坚定支持者的决心：他们必将改变苦痛的当下，成为点燃亚洲革命星火的燧石；哪怕死亡在等待着他们，武士的利刃也将出鞘，拼尽全力砍向敲骨吸髓的财阀与凌驾于亚洲之上的王侯将相。\n"
 revolutionary_bushido_intro_short: "学院派思潮之一，由枯叶螳提出，支持者有黄蜂。主要盛行于浩源幕府，在诸夏也有中华虎甲等新兵家的支持者，但枯叶螳认为仅适用于幕府。将武士道的荣誉、礼、克己等理念与激进革命思想结合，主张幕府内思想进步的武士阶层成为社会革命的先锋，领导工虫走向阶级斗争与解放；对外反对殖民主义和普世主义，追求引领亚洲的社会解放。黄蜂更强调民本，重视培养民间工团组织，武士则负责方向引导。浩源幕府上层内部和一些下层士官存在激进派的革命武士道。"

 rebirthism: "学院派"
 rebirthism_desc: "涅槃主义"
 rebirthism_type_desc: "$academicism_intro$"
 rebirthism_intro: "在绝对正确的革命之上，仍然存在一个绝对正确的“人道主义”。尽管古世代的人类社会已经成为过往云烟，但这番已不可考的人类作家之语，却依然在万年之后的虫类社会掀起些许回响。虫类社会的共情能力和情感并不在人类之下，却因生命的廉价而缺乏任何形式的关照和关怀。对于社会的芸芸众生是如此，对于他们本身亦是如此。蝼蚁的生命微不足道，而蝼蚁自己亦是如此认为。\n\n在习以为常的暴行和麻木之下，“虫道主义”和“虫文思想”似乎永远只会是遥不可及的乌托邦之梦，是少数知识分子和文学家清谈的对象。但作为学院派理念的坚持者，枯叶蛾显然并不如此认为。尽管她预言的“世界范围的革命浪潮”很快便被证伪，但枯叶蛾的努力仍是这混沌世界的一盏明灯、可能足以点燃世界的烈火：将虫道主义思想与更加激进的革命思潮结合，“涅槃主义”也随之而生。对于暴政、种族灭绝、屠杀、蔑视生命等行为的否定，对于社会公义、博爱与道德的认可，汇聚为涅槃主义的思想根基。与此同时，对于经济、政治、技术发展和文化主张，涅槃主义者却也抱有些许分歧。涅槃主义首先吸引了社会上的慈善家和近乎被抛弃的弱势群体，紧接着便获得了知识分子、文化改革派和许多工虫的青睐。愈来愈多的虫团结于枯叶蛾的名号之下，期许能够为世界带来更加美好的未来。\n\n创造一个更加美丽的明天，需要社会成员广泛的努力和改变。而涅槃主义者亦深刻地赞同这一点：期许团结起他们的学院派同志，期许葬送暴政与苦难，期许引导足以改写社会秩序与公众思想的文艺复兴和文化革新，而在最终，为虫类文明的社会带来凤凰涅槃般的重生，以此打造全新的道德和伦理。不论涅槃主义者能否抵达他们期许的理想，抵达每一个个体都能得到尊重和关怀的未来，其存在都至少证明了一件显而易见的事情：面对苦难的当下，良知能做的不只有忍受与等待新时代自动到来。\n"
 rebirthism_intro_short: "学院派思潮之一，以人类世的人文主义和人道主义为基础，由枯叶蛾将虫类社会空想的虫文主义、虫道主义观念理论化、系统化的成果，支持者有枯叶蝶、隐翅虫。由激进的自由主义者主张，先后吸引了慈善家、弱势群体、知识分子、文化改革派与工虫的支持，主要盛行于新纽约邦，与婆罗多的大众无政府主义者亦有合作，在诸夏有金斑喙凤蝶等新儒家的支持者。理论根基是对暴政、种族灭绝、屠杀、蔑视生命等行为的否定，与对于社会公义、博爱、道德的认可。提倡文化和道德理念的“文化重生”，主张依靠教育宣传重塑伦理和道德观。经济上大多认为“私有制和狭隘的民族观是不道德的”，因此支持激进的社会主张。不放弃使用武力。有的涅槃主义者也加入了解放异教主义组织和阴影主义结社。"

 occultism: "学院派"
 occultism_desc: "神秘学派"
 occultism_type_desc: "$academicism_intro$"
 occultism_intro: "早在四百年前，神秘学的发展便已经进入了全新的时代：枪炮被附上符文，仪式被运用为战略打击。尽管在发展层面已经取得了如此伟大的成就，神秘学的发展却也止步于此了。灵性的力量被用于完成物质的目的，秘契被破坏，但公众依然对这些神秘事物的背后一无所知。而当不满的神秘学家与学院派运动的兴起相结合时，学院派的“神秘学派”也随之诞生。\n\n神秘学派的激进主张来自于库特学院的神秘学家花皮蛛。作为一位被称为混沌魔法研究者的神秘学家，她无疑抱有极度离经叛道的思想：在这个大多数神秘学都依赖本土文化体系的时代，花皮蛛倡导依靠综合性和实用化的结合实现虫类灵性的终极解放。这番说辞在日后吸引了大量神秘学家参与到神秘学派的运动之中，并在日后缔造出了一系列成就。在神秘学派构想的社会之中，神秘学家与灵修将成为社会的基石，神秘学的研究也将迎来前所未有的高峰。而与此同时，神秘学研究者也将与公众分享神秘学带来的灵性与力量，促成社会层面上虫类文明的终极解放：享受神性，结束一切物质世界的苦痛。\n\n神秘学派的支持者时常活跃于各国社会的科研相关部门之中，但其激进到令虫不安的主张也使得其他学院派成员时常对其较为疏远，乃至批判其主张的不切实际。时至今日，神秘学派的发展也逐步成熟，而日后扑朔迷离的未来则无从知晓。不论如何，神秘学派始终相信，灵性的宝藏将永远存在。\n"
 occultism_intro_short: "学院派门类之一，即神秘学家，主要被统称为“混沌魔法使用者”。由花皮蛛等激进的自由主义者主张，活跃于各国科研部门中，曾受到诸夏新道家水蛭的影响，在诸夏有新阴阳家的支持者。不同于各地神秘学趋于保守的仪式魔法，神秘学派更接近混沌魔法，且在神秘学理论研究上更加深入，更大规模投入研究。倡导综合性和实用化的结合实现虫类灵性的终极释放，追求让神秘学家与灵修成为社会基石，与公众分享神秘学的灵性与力量，促成享受神性、结束苦痛的社会解放。和侧重应用神秘学技术的神秘主义（Mystic）政权相比，神秘学派和社会解放高度捆绑，关注社会与个体灵性的解放。"

 primitivism: "学院派"
 primitivism_desc: "原始主义"
 primitivism_type_desc: "$academicism_intro$"
 primitivism_intro: "工业社会为世界带来了无尽的伤疤，青藏高原的无数工厂、亚蚂逊联合城邦的化学产业都是如此；但非工业的社会则是更彻底的地狱。面对两难的局面，“原始主义”给出了意想不到的答案。\n\n学院派意义上的原始主义显然并非只是返祖主义的狂想。作为经历了发展与完善的一种革命性理论，原始主义许诺了这样一个未来：依靠神秘学与尖端技术的帮助，虫类文明将塑造一个能够生活的、取代工业社会的“更好”的自然状态。一个被充分设计和改造的生态系统将宽容地接纳社会的每一分子、每一物种，它足以承载整个虫类社会，能够支持虫类文明的发展——这将是一种非工业化的模式，是一种足以改写文明发展的方案。\n\n尽管如此，原始主义之内同样存在分歧和矛盾，受无政府主义影响的原始主义者、倡导构建生物种姓制的原始主义者，与支持保留工业文明、而要求文化与精神层面的野蛮化蛮族化的原始主义者，他们之间的矛盾始终长久存在。而在蚭罗河与亚蚂逊，这些古老土地之上的虫类也不乏有原始主义的信徒。但不论如何演变，他们绝非待宰的羔羊，更非只会利用颚牙的原始蛮虫。\n"
 primitivism_intro_short: "学院派思潮之一，由屎壳郎、非洲巨蜣螂主张。主要盛行于大尼罗河帝国。主张建立生态公社，利用尖端生物科技和神秘学建立林地和大面积生态系统，达到一个更好的自然状态以取代工业社会，并推进社会文化与精神的野蛮化。内部或受无政府主义影响，或支持生物种姓制度，或提倡保留工业文明而促进精神野蛮化，各派存在矛盾分歧。在大尼罗河帝国、亚马逊联合城邦有支持者。"

 survivism: "学院派"
 survivism_desc: "生命主义"
 survivism_type_desc: "$academicism_intro$"
 survivism_intro: "万物终有一死，不过或早或晚。这项基于经验得出的调查结论自古以来便是虫类社会的常识。在医学的进步下，也许一个虫的生命可以被延长十年、二十年甚至九十年，但他们最终仍然无法逃脱死亡。对于虫类而言，这是毋庸置疑的事实；但随着工业社会与神秘学的发展，这些过去的铁律也开始受到了挑战：虫类愈来愈向世界证明他们的力量，和他们以自身意志改造世界与自然的能力。那么他们能否将生命最基础的规则做出改变？\n\n学院派哲学构筑的“生命主义”便是这种对最基础生命观的挑战者。作为由蜗牛和蟑螂提出的哲学理念，生命主义的本质便是追求永恒与极致世界改造的生命哲学。在突飞猛进的神秘学与生物科学技术体系下，虫类已经能够畅想一个不可思议的蓝图：虫类将通过足够发达的生物科学实现生命的永垂不朽，甚至通过特定的神秘学技术复生过去先祖的魂灵。这种生命哲学来自学院派思想发展中不可避免的哲学问题：倘若理想社会在未来被构筑，这对于过去在压迫中死去的逝者是否是一种最大的不公？而虫类社会广泛存在的死亡更是成为了激发生命主义的关键动力：一种极致的叛逆行动。作为革命者，他们将挑战世界上最为强大却成为房中之象的暴君——死亡本身。\n\n在诞生后极短的时间里，生命主义便分割为了两个重要的组成部分：以科学家和社会科研虫员为主导的专制派，以及倡导平民共同参与运动的自由派。专制派认定必须投入精力、不惜一切代价实现目标；而自由派却从对专制派的质疑中诞生：倘若社会层面的变化不大，专制派只会成为新时代的神秘学贵族，甚至永恒的生命也只会带来永恒的奴役。相比于专制派，自由派更期望打造一个这样的世界：在这个世界里，生命的永垂不朽将引领社会各成员迈入一个光明的未来，一个所有虫都能去生活、都能去爱、都能去创造与探索的全新世界，而生命的活力在此刻也才将真正拥有意义。自由派与专制派各据一角，但也无法真正说服任何一方。\n\n时至今日，生命主义激进的哲学观也开始在虫类社会激起猛烈的回响，从群山帝国到欧亚沙皇国，再到那些有着最尖端科技的虫类国度，生命主义迫使越来越多的虫类开始思考与面对死亡的问题。而不论他们成败与否，他们的宣言与呐喊终将成为永远回荡于虫类社会之上的幽灵和余音：宣判死亡的死刑！\n"
 survivism_intro_short: "学院派思潮之一，由蜗牛提出，蟑螂进一步发展。其理论强调生命的必要性，认为死亡是必须克服的一种问题，反对虫类社会中的死亡崇拜文化。一些激进派主张通过技术实现永生或复活。"

 liberation_paganism: "学院派"
 liberation_paganism_desc: "解放异教主义"
 liberation_paganism_type_desc: "$academicism_intro$"
 liberation_paganism_intro: "在帝国扩张膨胀的图景下，世界各地虫类部族所失去的远不止政治上的权利与自我支配命运的能力。各个部族的神灵与信仰——创造自民族精神而又反过来塑造这一民族的事物——也随着帝国征服的铁蹄而被剥夺，被活生生地从一个民族的精神中撕扯出来。一个部族被迫信仰帝国开拓者的神灵，被迫接纳另一个民族的一切。在这番图景的异见者与学院派崛起的双重作用下，“解放异教主义”也随之孕育。\n\n作为学院派理念的支持者，解放异教的理念显而易见是复杂的。身为民族主义的延伸，解放异教在其理念构建上兼具了民族解放、异教复兴、社会革命三部分。古老的信仰在名义上迎来了复兴，但在社会层面的批评中，解放异教所行之事实质上与取缔古老信仰的“亵渎”并无二致：解放异教主义并不复兴古老的信仰，而是重新发明创造它们。古老的众神与社会主义者携手并进，他们在古老神话中所持的诸多圣物也被替换为工虫的铁锤或是社会革命的理论书籍。被“复兴”的古老经书实际上却是引导革命的“红书”，而古老信仰的教条也被重新赋予了社会解放的意味。这诸多特点也让解放异教与神秘学的追求者之间有着难以衡量的微妙联系。但与之相对的是，解放异教的许多支持者中不乏有真正笃信解放之路的信徒。赤色的祭司笃信古老众神将与工虫和革命者站在一起反抗帝国的秩序，因为这将是他们能给予其子民的最大帮助。\n\n尽管如此，解放异教主义的运动时常是离散的。虽然抱有相似的理想，但他们却信奉不同的众神。一个国际化的解放异教组织也时常被认为是不可能的。但尽管如此，信奉解放之路的异教徒仍将活跃于世界各地：诸夏掌控的澳大拉西亚、南洋的群岛之中乃至于更多地方，他们在世界各地的民族起义中崭露头角。或许有朝一日，在解放异教的努力下，古老的众神终将以全新的面孔回归世间。\n"
 liberation_paganism_intro_short: "学院派思潮之一，由花背短柱叶甲主张，兼具民族解放、异教复兴和社会革命理念。文化上提倡对异教进行重新的发明创造而非复古，实质上取缔旧文化，以对抗普世主义的宗教与文化；政治上与社会主义者深度合作，以工虫标志物和社会革命理论书籍作为圣物，对旧教条赋予社会解放的意义；经济上主要支持公有制经济。整体运动比较离散，在同一理想下存在不同神明的信仰，难以形成国际化组织。在南洋民族抵抗军和澳大拉西亚蛛形纲联合抵抗军有支持者。"

 labour_federalism: "学院派"
 labour_federalism_desc: "工虫联邦主义"
 labour_federalism_type_desc: "$academicism_intro$"
 labour_federalism_intro: "自从四百年前虫类的工业文明崭露头角以来，工虫无疑都是这庞大社会中最不应至于此地的群体：当战争爆发，是工虫在工厂和战场上保卫祖国；在和平时期，也是工虫为国家与社会创造其赖以生存的养分。但如此卓越而根基性的贡献并未使工虫得到他们理所当然享受的东西：被炮火杀死的是他们，被饥荒摧残的是他们，被屠戮的是他们，成为奴隶的是他们，沦为神秘学技术试验品的也是他们。现代化的、工业化的虫类文明是工虫的受惠者，但它们却没有为工虫做出任何弥补。而为数不多的工会组织也在鼠目寸光的代表中堕落，仅在争取到稍稍优于过往的工钱或生活环境后便停滞不前，其代表甚至也在与厂长或贵族的谈笑间出卖了他们的工友。\n\n“工虫联邦主义”这一革命理想便随之诞生，它融合了社会上既有的“超工会学说”。在理论构想层面，工虫联邦主义的奠基者独角仙抛出了这样一副图景：工虫大众掌握着工厂和机械，常备的军队被废除而以工虫民兵队替代；而在工虫之上，一个庞大的全国性总工会掌握着整个国家的政治、教育、生产任务和军事指挥，但其成员也同样来自工虫选举诞生的工虫代表；哪怕是总工会的最高成员，他们同样需要做出劳动，并且不能得到超过熟练工虫的物资配给和工资。工虫联邦主义首先在诸夏和群山帝国掀起了轩然大波，但两国的镇压态度又令其信奉者开始走向其它区域发展。时至今日，远在非洲的海角蜜蜂民族解放军与欧罗巴的神圣日耳曼帝国也开始孕育出工虫联邦主义的信徒。\n\n而作为被诸夏开发、本该接受诸夏王化的东北亚一带，最终诞生了工虫联邦派的第一个革命政权。学院派赶在第二次世界大战这一关键节点，依靠在工虫群体中宣传并发展力量，在诸夏忙于应对群山帝国和中亚战事、无暇顾及东北亚局势时揭竿而起，最终勉强脱离了诸夏控制，缔造出团结的东北亚联邦。东北亚联邦虽然让全世界范围的工虫为之振奋，却也带来了新的迷茫：东北亚联邦仍有许多不足和矛盾，远非工虫的乌托邦。于外，诸夏的威胁前所未有地强烈；于内，“长春派”“哈尔滨派”“大连派”与“首尔派”的矛盾也愈发撕扯着东北亚联邦与工虫联邦主义的未来。但不论历史为独角仙及他的信众做出怎样的宣判，工虫阶级将永远在他们漫长的黑暗岁月中留下属于他们的一线光芒。\n"
 labour_federalism_intro_short: "学院派思潮之一，由独角仙提出。主要盛行于东北亚联邦。以人类世的工团主义为基础，融合社会上超工会学说的革命理想，主张由工虫阶级的全国性总工会掌握国家政权以及社会的一切，成员参与劳动、选举，公平配给。政治上大体主张联邦制，军事防卫由工虫民兵队代替常备军队。地方上由各级工虫委员会控制工厂和机械。曾在诸夏和群山帝国引起巨大反响，但被迅速镇压。浩源幕府、神圣梅尼加戈帝国、塔布里尼亚和海角蜜蜂民族解放军也有其支持者。"

 new_hundred_schools_of_thought: "学院派"
 new_hundred_schools_of_thought_desc: "新百家"
 new_hundred_schools_of_thought_type_desc: "$academicism_intro$"
 new_hundred_schools_of_thought_intro_short: "诸夏本地学院派思潮的集合，新道家和新儒家数量较多。本地学院派因受诸夏打击迫害，故借“新百家”之名活动。有上台领导诸夏的可能。"

 ### Reformism ###

 reformism_intro: "改良主义大体上放弃暴力革命，主张温和地、循序渐进地改良社会。"

 liberalism: "改良主义"
 liberalism_desc: "自由主义"
 liberalism_type_desc: "$reformism_intro$"
 liberalism_intro: "改良主义思潮之一。介于保守主义和学院派激进自由主义思想之间，主张维护自由权利与私有制等。"

 progressivism: "改良主义"
 progressivism_desc: "进步主义"
 progressivism_type_desc: "$reformism_intro$"
 progressivism_intro: "改良主义思潮之一。主张维护劳动权益、推进民主与社会公平正义等。"

 populism: "改良主义"
 populism_desc: "平民主义"
 populism_type_desc: "$reformism_intro$"
 populism_intro: "改良主义思潮之一。主张维护平民大众权益、反对精英等民粹主义思想，在社会制度的主张上与无政府主义存在隔阂。"

 national_emancipationism: "改良主义"
 national_emancipationism_desc: "民族解放主义"
 national_emancipationism_type_desc: "$reformism_intro$"
 national_emancipationism_intro: "改良主义思潮之一。主张为殖民地等受到外来压迫的地区争取独立与解放。常常受到一些学院派思潮的影响。"

 republicanism: "改良主义"
 republicanism_desc: "共和主义"
 republicanism_type_desc: "$reformism_intro$"
 republicanism_intro: "改良主义思潮之一。主张共和政体与公民参与政治。"

 anarchist_liberalism: "改良主义"
 anarchist_liberalism_desc: "无政府自由主义"
 anarchist_liberalism_type_desc: "$reformism_intro$"
 anarchist_liberalism_intro: "改良主义思潮之一。以人类世的无政府资本主义为基础，主张以联合的商帮商团及企业联盟取代政府。"

 ### Conservatism ###

 conservatism_intro: "保守主义包括一些较为守旧或反动的主张。"

 universalism: "保守主义"
 universalism_desc: "普世主义"
 universalism_type_desc: "$conservatism_intro$"
 universalism_intro: "保守主义思潮之一。第一次世界大战后发展起来的思想。以人类世的帝国主义为基础，融合大国沙文主义、保守主义、种族主义、霸权主义等反动理念。追求缔造跨洲际的秩序，使政权超越地理限制，将自身意志推向世界，成为普世的存在。"

 monarchy: "保守主义"
 monarchy_desc: "君主制"
 monarchy_type_desc: "$conservatism_intro$"
 monarchy_intro: "保守主义思潮与制度之一。主张实行以君主作为国家元首的政体。"

 militarism: "保守主义"
 militarism_desc: "军国主义"
 militarism_type_desc: "$conservatism_intro$"
 militarism_intro: "保守主义思潮之一。主张将国家置于军事控制之下，进行扩军备战与侵略扩张。"

 theocracy: "保守主义"
 theocracy_desc: "神权统治"
 theocracy_type_desc: "$conservatism_intro$"
 theocracy_intro: "保守主义思潮与制度之一。主张将神权与政权结合，由宗教首领掌握国家政权。"

 oligarchy: "保守主义"
 oligarchy_desc: "寡头制"
 oligarchy_type_desc: "$conservatism_intro$"
 oligarchy_intro: "保守主义思潮与制度之一。主张由少数首领掌握国家政权。"

 ata_military_dictatorship: "保守主义"
 ata_military_dictatorship_desc: "军事独裁"
 military_dictatorship_type_desc: "$conservatism_intro$"
 ata_military_dictatorship_intro: "保守主义思潮与制度之一。主张由军士首领独揽权力实行专制统治。"

 pure_primitivism: "保守主义"
 pure_primitivism_desc: "纯粹原始主义"
 pure_primitivism_type_desc: "$conservatism_intro$"
 pure_primitivism_intro: "保守主义思潮之一。认为自然状态下的社会优于现代化的社会，反对工业化，主张捣毁机器、对抗快速工业化进程，从非自然状态回归自然状态。"

 corporate_politics: "保守主义"
 corporate_politics_desc: "企业政治"
 corporate_politics_type_desc: "$conservatism_intro$"
 corporate_politics_intro: "保守主义思潮与制度之一。主张将企业及其运作形式与国家政权相结合。"

 ultranationalism: "保守主义"
 ultranationalism_desc: "极端民族主义"
 ultranationalism_type_desc: "$conservatism_intro$"
 ultranationalism_intro: "保守主义思潮之一。认同本民族的优越性，对其他民族有强烈排外倾向。"

 technocratic: "保守主义"
 technocratic_desc: "技术官僚制"
 technocratic_type_desc: "$conservatism_intro$"
 technocratic_intro: "保守主义思潮之一。"


 ### Additional Currents ###

 demotic_anarchism_desc: "大众无政府主义"
 demotic_anarchism_intro: "无政府主义思潮之一，由食蚜蝇提出。主要盛行于婆罗多，与涅槃主义者有合作，在群山帝国和中亚也有支持者。经济上主张规模极为有限的蒲鲁东式互助市场；政治上以激进的民粹主义和平民主义主张“阶级复仇”，即在夺取政权后默许低种姓屠杀高种姓；组织上在夺取政权前呈高度中心化模式。"

 programmatic_anarchism_desc: "纲领无政府主义"
 programmatic_anarchism_intro: "无政府主义思潮之一，由意大利蜜蜂提出。主要盛行于地中海联邦。主张在基本管理与资源配置高度自治的基础上，由无政府主义者构成“无政府党”，对理论、教育、改造社会等进行领导，保持无政府主义的领导地位。其支持者与美学主义一派有合作。"

 social_anarchism_desc: "社会无政府主义"
 social_anarchism_intro: "无政府主义思潮之一，由安蜂虻提出。主要盛行于西伯利亚地区。经济上主张互助的社会模式和高度公有化的经济，吸纳大众无政府主义与纲领无政府主义理论；政治上完全否定国家的意义，主张依靠教育和社会改造消灭国家和部分民族。"

 survivism_autocratic_faction_desc: "专制派"
 survivism_autocratic_faction_intro: "生命主义派别之一，主张由科学家和社会科研虫员主导，以神秘主义社团活动。"

 survivism_liberal_faction_desc: "自由派"
 survivism_liberal_faction_intro: "生命主义派别之一，主张大规模发动群众。"

 neo_taoists_desc: "新道家"
 neo_taoists_intro: "诸夏新百家之一，支持无政府主义思潮。提倡小国寡民；经济上主张蒲鲁东式的互助经济，支持工业与技术。"

 neo_taoist_individualist_faction_desc: "个体派"
 neo_taoist_individualist_faction_intro: "新道家派别之一，由水蛭主张。以人类世的个人无政府主义为基础，重视个体自由，提倡松散自治。"

 neo_taoist_collectivist_faction_desc: "集体派"
 neo_taoist_collectivist_faction_intro: "新道家派别之一，由中华蜜蜂主张。重视集体化的互助模式。"

 neo_confucianists_desc: "新儒家"
 neo_confucianists_intro: "诸夏新百家之一，支持涅槃主义思潮，由金斑喙凤蝶主张。"

 new_military_school_desc: "新兵家"
 new_military_school_intro: "诸夏新百家之一，支持革命武士道思潮，由中华虎甲主张。主张诸夏本地思想进步的军事贵族成为社会革命的先锋。"

 neo_legalists_desc: "新法家"
 neo_legalists_intro: "诸夏新百家之一，支持新普世主义思潮。主张将诸夏整合为战争机器，扩张建立称霸亚洲的大帝国。"

 new_yin_yang_school_desc: "新阴阳家"
 new_yin_yang_school_intro: "诸夏新百家之一，支持神秘学派。"

 siberianism_desc: "西伯利亚主义"
 siberianism_intro: "民族解放主义思潮之一，主要由西伯利亚的地方主义者支持。主张西伯利亚地区独立于欧亚沙皇国。受到社会无政府主义、解放异教主义、美学主义、神秘学派、工虫联邦主义等多门学院派的综合影响。统一的理念是：西伯利亚是全球现有秩序最薄弱的一环，只有依靠夺取西伯利亚才能进一步实现更大的目标。"

 pure_siberianism_desc: "纯粹西伯利亚主义"
 pure_siberianism_intro: "西伯利亚主义思潮之一，由西伯利亚蝗主张。主张西伯利亚独立自保。"

 paraacademic_siberianism_desc: "准学院派西伯利亚主义"
 paraacademic_siberianism_intro: "西伯利亚主义思潮之一，由安蜂虻、花背短柱叶甲主张的一种临时意识形态。主张独立后扩展革命。综合了社会无政府主义、解放异教主义、美学主义、神秘学派、工虫联邦主义等多门学院派思想，独立后将与学院派思潮合流。"

 nanyang_emancipationism_desc: "南洋解放主义"
 nanyang_emancipationism_intro: "民族解放主义思潮之一，主要盛行于南洋民族抵抗军。主张推翻南洋都护府，使南洋地区独立于诸夏的势力范围。受到解放异教主义等学院派的影响。"

 central_asian_emancipationism_desc: "中亚解放主义"
 central_asian_emancipationism_intro: "民族解放主义思潮之一，主要盛行于中亚匪区。主张击退诸夏对中亚秩序的侵扰，争取中亚的独立与和平。受到大众无政府主义等学院派的影响。"

 cape_honeybees_nationalism_desc: "海角蜜蜂民族主义"
 cape_honeybees_nationalism_intro: "民族解放主义思潮之一，主要盛行于海角蜜蜂民族解放军。海角蜜蜂曾因独特的产雌单性生殖模式受到种族歧视与迫害，遂产生了团结一致共同抗争的民族主义的思潮。以工虫联邦主义和无政府主义占据主导，还有温和的民族解放运动派和极端民族主义。"

 variozoism_desc: "杂虫主义"
 variozoism_intro: "民族解放主义思潮之一，盛行于澳大拉西亚蛛形纲联合抵抗军等地区。主张为受到歧视的杂虫争取平等权益。"

 australasian_arachnidism_desc: "澳大拉西亚蛛形纲主义"
 australasian_arachnidism_intro: "民族解放主义思潮之一，主要盛行于澳大拉西亚蛛形纲联合抵抗军。主张以澳大拉西亚地区的蛛形纲土著代表本地受压迫群体，推翻南洋都护府，使澳大拉西亚地区独立于诸夏的势力范围。受到解放异教主义等学院派的影响，反对种族主义。"

 insect_supremacism_desc: "昆虫至上主义"
 insect_supremacism_intro: "极端民族主义思潮之一，盛行于昆虫纲兄弟会等地。认为昆虫比杂虫高等，歧视杂虫，往往在行动上侮辱、奴役甚至屠杀杂虫。"

 ultravariozoism_desc: "极端杂虫主义"
 ultravariozoism_intro: "极端民族主义思潮之一。认为杂虫比昆虫高等，歧视昆虫，往往在行动上侮辱、奴役甚至屠杀昆虫。有一部分是由受压迫杂虫的杂虫主义变异而来。"

 arachnid_supremacism_desc: "蛛形纲至上主义"
 arachnid_supremacism_intro: "极端民族主义思潮之一。认为蛛形纲比其他虫类高等，歧视昆虫和非蛛形纲的杂虫，往往在行动上更倾向于侮辱、奴役甚至屠杀昆虫。有一部分是由受压迫蛛形纲的杂虫主义变异而来。"

 antihumanism_desc: "反人类主义"
 antihumanism_intro: "极端民族主义思潮之一，盛行于进化者同盟军的激进派。认为人类是覆灭的落后文明，主张“去人类化”，尽可能摒弃人类文明的影响，弘扬虫类文明的“纯粹正统”。"


