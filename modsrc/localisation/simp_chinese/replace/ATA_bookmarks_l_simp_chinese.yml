l_simp_chinese:
 classics_and_rebirth: "古典与新生"
 classics_and_rebirth_desc: "第二次世界大战带来的满目疮痍并没有随着预想中的重建而恢复，正好相反的是它开始化脓和感染。在亚洲，诸夏巨龙的宝座已经因南洋民族解放运动、群山帝国的复仇主义与来自东北亚学院派革命者的威胁处在分崩离析的边缘。在欧洲，战争的余烬和无边血潮汇聚成的混沌洪水誓要将欧罗巴再度涤荡，地中海的烈火与斯堪地维亚的坚冰、雄鸡与猎鹰彼此碰撞。在非洲，战争与挣扎永不停歇地撕扯着旧时代文明的故乡，古老的部族与新生的起义接连不断。而在血海之中，历史与未来如一叶孤舟愈发飘向远方......"
 the_dance_of_wild_wilderness: "蛮荒之舞"
 the_dance_of_wild_wilderness_desc: "第二次世界大战并未分出真正决定性的胜负，但霸权与诸国已经处在深渊的边缘。在美洲的极北之地，寒风与暴风雪催生的国度正在将其触角伸向别处。而在纷争的南部，所有虫都有着自己期望依靠新战争达成的目标，不论这目标究竟为何。在中美洲，亚马逊的诸城邦正畏缩在壁垒之后观看新玛雅与新阿兹特克的角力。在南美洲这属于蚁群的大地，烈火王国的女皇剑指南北，与之对峙的阿根廷蚁却也在酝酿着一场心灵的风暴。但在浩劫之中，一个新秩序终将降生。"